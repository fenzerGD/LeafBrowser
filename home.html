<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>LeafBrowser</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }
        #clock {
            font-size: 72px;
            font-weight: bold;
            margin-bottom: 40px;
        }
        #search {
            width: 500px;
            padding: 12px 20px;
            font-size: 16px;
            background: var(--input);
            border: 1px solid var(--text);
            border-radius: 25px;
            color: var(--text);
            outline: none;
        }
        #mango {
            position: fixed;
            bottom: 15px;
            right: 15px;
            font-size: 24px;
            background: none;
            border: none;
            cursor: pointer;
            opacity: 0.3;
        }
        #mango:hover { opacity: 1; }
        #overlay {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            align-items: center;
            justify-content: center;
            z-index: 999;
        }
        #overlay.show { display: flex; }
        video { max-width: 80%; max-height: 80%; border-radius: 10px; }
    </style>
</head>
<body>
    <div id="clock">00:00:00</div>
    <input id="search" type="text" placeholder="Search or enter a link">
    <p id="socials-title">My socials</p>
    </div>
    <button id="mango">🥭</button>
    <div id="overlay" onclick="this.classList.remove('show'); document.getElementById('vid').pause()">
        <video id="vid" controls>
            <source src="/home/romixcaca/Музика/mango.mp4" type="video/mp4">
        </video>
    </div>
    <script>
        // Застосовуємо тему
        const params = new URLSearchParams(window.location.search);
        const bg = params.get('bg') || '#1a1a1a';
        const text = params.get('text') || '#ffffff';
        const input = params.get('input') || '#2b2b2b';
        document.documentElement.style.setProperty('--bg', bg);
        document.documentElement.style.setProperty('--text', text);
        document.documentElement.style.setProperty('--input', input);

        // Годинник
        function updateClock() {
            const now = new Date();
            const h = String(now.getHours()).padStart(2, '0');
            const m = String(now.getMinutes()).padStart(2, '0');
            const s = String(now.getSeconds()).padStart(2, '0');
            document.getElementById('clock').textContent = h + ':' + m + ':' + s;
        }
        setInterval(updateClock, 1000);
        updateClock();

        // Пошук
        document.getElementById('search').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                const q = this.value;
                if (q.startsWith('http')) {
                    window.location.href = q;
                } else {
                    window.location.href = 'https://google.com/search?q=' + encodeURIComponent(q);
                }
            }
        });

        // Манго
        document.getElementById('mango').addEventListener('click', function() {
            document.getElementById('overlay').classList.add('show');
            document.getElementById('vid').play();
        });
    </script>
</body>
</html>
